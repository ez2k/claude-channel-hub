admin:
    addr: :8082
supervisor:
    health_check_interval: 30s
    max_restarts: 10
    restart_delay: 2s
    restart_backoff_max: 5m0s
claude:
    default_version: latest
    versions_dir: /root/.claude-channel-hub/versions
    auto_update: false
    auto_update_interval: 0s
defaults:
    model: ""
    system_prompt: ""
    permission_mode: dangerously-skip
    plugins_dir: ./plugins
    plugin: telegram-enhanced
    plugin_marketplace: claude-channel-hub
bots:
    - id: main-bot
      type: telegram
      name: 메인 봇
      enabled: true
      token: 8660591240:AAHbICzUlum_QkYtzYbr3ti_lzdbcBsGSiw
      plugin: telegram-enhanced
      plugin_dir: ""
      plugin_marketplace: claude-channel-hub
      claude_version: ""
      model: ""
      system_prompt: ""
    - id: claude_bot
      type: telegram
      name: 클로드 봇
      enabled: true
      token: 8578383619:AAGSYUbFiPj5TGwVOwa1rpOvFyXO1scBZTU
      plugin: telegram-enhanced
      plugin_dir: ""
      plugin_marketplace: claude-channel-hub
      claude_version: ""
      model: ""
      system_prompt: ""
channels:
    - id: general
      bot: main-bot
      name: 일반 대화
      match:
        type: default
        chat_ids: []
        user_ids: []
        topic_ids: []
      model: ""
      system_prompt: ""
      data_dir: ./data/general
    - id: claude-bot-default
      bot: claude_bot
      name: 클로드 봇 대화
      match:
        type: default
        chat_ids: []
        user_ids: []
        topic_ids: []
      model: ""
      system_prompt: ""
      data_dir: ./data/claude-bot
